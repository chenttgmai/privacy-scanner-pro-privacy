<!doctype html>
<html lang="ko">
<head>

    }
    body { margin: 0; background: linear-gradient(180deg, #edf6f4, #f7fafb); font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; color: var(--text); }
    main { max-width: 900px; margin: 0 auto; padding: 48px 20px 60px; }
    .card { background: var(--card); border-radius: 28px; padding: 28px; box-shadow: 0 20px 60px rgba(13,34,38,.08); }
    h1 { font-size: 34px; margin: 0 0 8px; }
    h2 { margin-top: 28px; font-size: 22px; }
    p, li { line-height: 1.7; color: var(--muted); }
    .badge { display: inline-block; background: rgba(15,138,123,.1); color: var(--accent); padding: 8px 12px; border-radius: 999px; font-weight: 600; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <span class="badge">한국어</span>
      <h1>Zenlock 개인정보 스캔</h1>

      <h2>1. 설정</h2>
      <p>로컬 백업을 JSON 파일로 내보내고 AirDrop, Files, WeChat 또는 다른 로컬 도구로 이 앱이 설치된 기기 사이에서 옮길 수 있습니다.</p>
      <h2>2. 정보</h2>
      <p>Email: <a href="mailto:privacy@zenlock.app">privacy@zenlock.app</a></p>
      <p>https://chenttgmai.github.io/privacy-scanner-pro-privacy/ko/</p>
      <p>2026-04-17</p>
    </div>
  </main>
</body>
</html>
